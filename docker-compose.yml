services:
  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    ports:
      - "8080:8080"

  auth-svc:
    build:
      context: .
      dockerfile: services/auth-svc/Dockerfile
    ports:
      - "8081:8081"

  accounts-svc:
    build:
      context: .
      dockerfile: services/accounts-svc/Dockerfile
    ports:
      - "8082:8082"

  ledger-svc:
    build:
      context: .
      dockerfile: services/ledger-svc/Dockerfile
    ports:
      - "8083:8083"

  transfers-svc:
    build:
      context: .
      dockerfile: services/transfers-svc/Dockerfile
    ports:
      - "8084:8084"

  fraud-svc:
    build:
      context: .
      dockerfile: services/fraud-svc/Dockerfile
    ports:
      - "8085:8085"

  notifications-svc:
    build:
      context: .
      dockerfile: services/notifications-svc/Dockerfile
    ports:
      - "8086:8086"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: neobank
      POSTGRES_PASSWORD: neobank_dev_password
      POSTGRES_DB: neobank
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neobank -d neobank"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  kafka:
    image: bitnamilegacy/kafka:3.7.1
    ports:
      - "9092:9092"
    environment:
      KAFKA_CFG_NODE_ID: "0"
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      ALLOW_PLAINTEXT_LISTENER: "yes"
    volumes:
      - kafka_data:/bitnami/kafka

volumes:
  postgres_data:
  kafka_data:
